services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orbital_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: orbital_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbital_user -d orbital_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://orbital_user:password123@postgres:5432/orbital_tracker
      CELESTRAK_BASE_URL: https://celestrak.org/NORAD/elements/gp.php
      APP_ENV: development
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: